<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>博客首页</title>
  <link rel="stylesheet" href="/assets/css/jekyll-theme-chirpy.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Source+Sans+Pro:wght@400;600;700;900&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
  <script src="/assets/js/dist/theme.min.js"></script>
  <style>
    .post-preview-text {
      white-space: normal;
      line-height: 1.6;
      color: var(--text-muted-color);
      margin-bottom: 0.8rem;
      max-height: 14rem;
      overflow: hidden;
    }

    .error-tip {
      color: #d63939;
      margin-top: 1rem;
    }

    .markdown-body pre {
      padding: 0.8rem;
      background: rgba(127, 127, 127, 0.12);
      border-radius: 0.4rem;
      overflow: auto;
    }
  </style>
</head>
<body data-page="home">
  <aside aria-label="Sidebar" id="sidebar" class="d-flex flex-column align-items-end">
    <header class="profile-wrapper">
      <a class="site-title d-block" href="/">My Blog</a>
      <p class="site-subtitle fst-italic mb-0">由 Go API 驱动</p>
    </header>
    <nav class="flex-column flex-grow-1 w-100 ps-0">
      <ul class="nav">
        <li class="nav-item active"><a href="/" class="nav-link"><i class="fa-fw fas fa-home"></i><span>HOME</span></a></li>
        <li class="nav-item"><a href="/categories/" class="nav-link"><i class="fa-fw fas fa-stream"></i><span>CATEGORIES</span></a></li>
        <li class="nav-item"><a href="/tags/" class="nav-link"><i class="fa-fw fas fa-tags"></i><span>TAGS</span></a></li>
        <li class="nav-item"><a href="/archives/" class="nav-link"><i class="fa-fw fas fa-archive"></i><span>ARCHIVES</span></a></li>
      </ul>
    </nav>
  </aside>

  <div id="main-wrapper" class="d-flex justify-content-center">
    <div class="container d-flex flex-column px-xxl-5">
      <header id="topbar-wrapper" class="flex-shrink-0" aria-label="Top Bar">
        <div id="topbar" class="d-flex align-items-center justify-content-between px-lg-3 h-100">
          <nav id="breadcrumb" aria-label="Breadcrumb"><span>首页</span></nav>
          <div id="topbar-title">文章列表</div>
        </div>
      </header>

      <div class="row flex-grow-1">
        <main aria-label="Main Content" class="col-12 col-lg-11 col-xl-9 px-md-4">
          <div class="px-1">
            <h1 class="mb-4">最新文章</h1>
            <div id="post-list" class="flex-grow-1"></div>
            <div id="loading-tip" class="text-muted">正在加载文章...</div>
            <div id="error-tip" class="error-tip"></div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="/blog-api.js"></script>
</body>
</html>
