services:
  # PostgreSQL 数据库服务
  blog_db:
    image: postgres:15-alpine
    container_name: blog_postgres
    environment:
      POSTGRES_USER: gopher
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: blog_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # 数据持久化
    ports:
      - "127.0.0.1:5432:5432" # 可选：映射到宿主机方便用 Navicat 连接
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gopher -d blog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 博客应用服务
  blog_api:
    build: .
    container_name: blog_api
    expose:
      - "8080"
    environment:
      - GIN_MODE=release
      - DB_HOST=blog_db  # 这里的名字必须对应上面 service 的名字
      - DB_USER=gopher
      - DB_PASSWORD=securepassword123
      - DB_NAME=blog_db
      - DB_PORT=5432
    depends_on:
      blog_db:
        condition: service_healthy # 等待数据库完全就绪再启动
    restart: unless-stopped

  # Caddy 反向代理（自动 HTTPS）
  caddy:
    image: caddy:2-alpine
    container_name: blog_caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - blog_api
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config: